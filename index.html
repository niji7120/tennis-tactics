
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎾 테니스 복식 전술판</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: #05111f;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    height: 100dvh; overflow: hidden;
    color: #ddf0f8;
  }

  #topUI {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 8px 10px 8px;
    background: linear-gradient(to bottom, rgba(5,17,31,0.97) 70%, transparent);
    transform: translateY(0); transition: transform 0.3s ease;
  }
  #topUI.hidden { transform: translateY(-110%); }

  .header { text-align: center; margin-bottom: 5px; }
  .sub { font-size: 9px; letter-spacing: 4px; color: #38d9f5; text-transform: uppercase; }
  h1 { font-size: 15px; font-weight: 900; color: #fff; letter-spacing: 1px; }

  .presets { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; margin-bottom: 4px; }
  .preset-btn {
    padding: 5px 12px; border-radius: 20px; border: none; cursor: pointer;
    font-size: 12px; font-weight: 700;
    background: rgba(255,255,255,0.07); color: #7aacbf; transition: all 0.15s;
  }
  .preset-btn.active { background: #38d9f5; color: #060e1a; }

  .desc-box {
    background: rgba(56,217,245,0.07); border: 1px solid rgba(56,217,245,0.14);
    border-radius: 8px; padding: 4px 12px;
    text-align: center; font-size: 11px; color: #7fc8de;
  }

  #bottomUI {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    padding: 8px 8px 12px;
    background: linear-gradient(to top, rgba(5,17,31,0.97) 70%, transparent);
    transform: translateY(0); transition: transform 0.3s ease;
  }
  #bottomUI.hidden { transform: translateY(110%); }

  .controls { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; margin-bottom: 4px; }
  .ctrl-btn {
    padding: 7px 13px; border-radius: 18px; border: none; cursor: pointer;
    font-size: 12px; font-weight: 700;
    background: rgba(255,255,255,0.09); color: #7aacbf; transition: all 0.15s;
  }
  .ctrl-btn.arrow-on  { background: #FFD93D; color: #060e1a; }
  .ctrl-btn.draw-on   { background: #ff6bcb; color: #fff; }
  .ctrl-btn.cover-on  { background: rgba(56,217,245,0.18); color: #38d9f5; }
  .ctrl-btn.ball-on   { background: rgba(200,244,0,0.15); color: #b8e800; }
  .ctrl-btn.angle-on  { background: rgba(255,180,0,0.22); color: #ffb800; }
  .ctrl-btn.del    { color: #f87171; }
  .ctrl-btn.reset  { color: #4ade80; }
  .guide { font-size: 10px; color: #3e5f70; text-align: center; line-height: 1.5; }

  #toggleHint {
    position: fixed; top: 50%; right: 6px; transform: translateY(-50%);
    z-index: 200; width: 28px; height: 28px; border-radius: 50%; border: none;
    background: rgba(56,217,245,0.18); color: #38d9f5; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);
  }

  #courtWrap {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #court { display: block; touch-action: none; }
  #court.draw-cursor { cursor: crosshair; }

  /* 모달 */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.hidden { display: none; }
  .modal-box {
    background: #0d2035; border: 1px solid rgba(56,217,245,0.25);
    border-radius: 16px; padding: 20px; min-width: 300px; max-width: 92vw;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  .modal-title { font-size: 15px; font-weight: 900; color: #38d9f5; margin-bottom: 14px; text-align: center; }
  .modal-row { margin-bottom: 12px; }
  .modal-label { font-size: 11px; color: #7aacbf; margin-bottom: 4px; }
  .modal-input {
    width: 100%; padding: 8px 10px;
    background: rgba(255,255,255,0.07); border: 1px solid rgba(56,217,245,0.2);
    border-radius: 8px; color: #fff; font-size: 13px; outline: none;
  }
  .modal-input:focus { border-color: #38d9f5; }
  .modal-btns { display: flex; gap: 8px; margin-top: 14px; }
  .modal-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .modal-btn.ok     { background: #38d9f5; color: #060e1a; }
  .modal-btn.cancel { background: rgba(255,255,255,0.1); color: #7aacbf; }

  .color-swatches { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .color-swatch {
    width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent; transition: all 0.15s;
  }
  .color-swatch.selected { border-color: #fff; transform: scale(1.2); }

  .theme-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .theme-chip {
    padding: 6px 12px; border-radius: 20px; border: none; cursor: pointer;
    font-size: 12px; font-weight: 700;
    background: rgba(255,255,255,0.07); color: #7aacbf; transition: all 0.15s;
  }
  .theme-chip.selected { background: #38d9f5; color: #060e1a; }

  .share-link-box {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(56,217,245,0.2);
    border-radius: 8px; padding: 8px 10px; font-size: 11px; color: #7aacbf;
    word-break: break-all; margin-bottom: 8px; max-height: 80px; overflow-y: auto;
  }

  #toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: rgba(56,217,245,0.92); color: #060e1a;
    padding: 8px 18px; border-radius: 20px; font-size: 12px; font-weight: 700;
    opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 999;
  }
  #toast.show { opacity: 1; }

  .save-slot {
    display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px;
    background: rgba(255,255,255,0.05); margin-bottom: 6px; cursor: pointer; transition: background 0.15s;
  }
  .save-slot:hover { background: rgba(56,217,245,0.1); }
  .save-slot-info { flex: 1; }
  .save-slot-name { font-size: 13px; color: #ddf0f8; }
  .save-slot-date { font-size: 10px; color: #4e7a8a; }
  .save-slot-del {
    padding: 2px 8px; border-radius: 8px; border: none;
    background: rgba(248,113,113,0.15); color: #f87171; font-size: 11px; cursor: pointer;
  }
  .save-empty { text-align: center; color: #3e5f70; font-size: 12px; padding: 20px; }
</style>
</head>
<body>

<div id="topUI">
  <div class="header">
    <div class="sub">Tennis Doubles</div>
    <h1>🎾 복식 전술판</h1>
  </div>
  <div class="presets">
    <button class="preset-btn active" data-preset="basic">기본</button>
    <button class="preset-btn" data-preset="bothUp">양쪽전위</button>
    <button class="preset-btn" data-preset="bothBack">양쪽후위</button>
    <button class="preset-btn" data-preset="iForm">I포메이션</button>
    <button class="preset-btn" data-preset="aus">호주</button>
  </div>
  <div class="desc-box" id="descBox">💡 전위/후위 기본 대형</div>
</div>

<div id="courtWrap">
  <canvas id="court"></canvas>
</div>

<button id="toggleHint" title="버튼 보이기/숨기기">☰</button>

<div id="bottomUI">
  <div class="controls">
    <button class="ctrl-btn" id="btnArrow">➡️ 화살표</button>
    <button class="ctrl-btn" id="btnDraw">✏️ 그리기</button>
    <button class="ctrl-btn cover-on" id="btnCover">⭕ 커버존</button>
    <button class="ctrl-btn ball-on"  id="btnBall">🎾 공</button>
    <button class="ctrl-btn angle-on" id="btnAngle">📐 타구각</button>
    <button class="ctrl-btn del"   id="btnDel">🗑️ 삭제</button>
    <button class="ctrl-btn reset" id="btnReset">🔄 초기화</button>
  </div>
  <div class="controls" style="margin-top:2px;">
    <button class="ctrl-btn" id="btnBoardStyle">🎨 보드설정</button>
    <button class="ctrl-btn" id="btnSave">💾 저장</button>
    <button class="ctrl-btn" id="btnLoad">📂 불러오기</button>
    <button class="ctrl-btn" id="btnShare">🔗 공유</button>
  </div>
  <div class="guide" id="guide">
    선수 탭 → 선택(타구각) &nbsp;·&nbsp; 더블탭 → 편집 &nbsp;·&nbsp; 드래그 → 이동
  </div>
</div>

<div id="toast"></div>

<!-- 선수 편집 -->
<div class="modal-overlay hidden" id="modalPlayer">
  <div class="modal-box">
    <div class="modal-title">✏️ 선수 편집</div>
    <div class="modal-row">
      <div class="modal-label">이름 (예: 김철수)</div>
      <input class="modal-input" id="editName" maxlength="6" placeholder="이름 입력">
    </div>
    <div class="modal-row">
      <div class="modal-label">등번호</div>
      <input class="modal-input" id="editNumber" type="number" min="0" max="99" maxlength="3" placeholder="번호 입력">
    </div>
    <div class="modal-row">
      <div class="modal-label">포지션 (예: 전위 / 서버)</div>
      <input class="modal-input" id="editPosition" maxlength="6" placeholder="포지션 입력">
    </div>
    <div class="modal-row">
      <div class="modal-label">선수 색상</div>
      <div class="color-swatches" id="colorSwatches"></div>
    </div>
    <div class="modal-row">
      <div class="modal-label">선수 크기</div>
      <select class="modal-input" id="editSize">
        <option value="0.8">작게</option>
        <option value="1" selected>보통</option>
        <option value="1.3">크게</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="modal-btn cancel" id="editCancel">취소</button>
      <button class="modal-btn ok" id="editOk">확인</button>
    </div>
  </div>
</div>

<!-- 보드 설정 -->
<div class="modal-overlay hidden" id="modalBoard">
  <div class="modal-box">
    <div class="modal-title">🎨 보드 설정</div>
    <div class="modal-row">
      <div class="modal-label">코트 테마</div>
      <div class="theme-row" id="themeRow">
        <button class="theme-chip selected" data-theme="green">🟩 그린</button>
        <button class="theme-chip" data-theme="clay">🧱 클레이</button>
        <button class="theme-chip" data-theme="hard">🔵 하드</button>
        <button class="theme-chip" data-theme="dark">⚫ 다크</button>
        <button class="theme-chip" data-theme="grass">🌿 잔디</button>
      </div>
    </div>
    <div class="modal-row">
      <div class="modal-label">전체 선수 크기</div>
      <select class="modal-input" id="boardSize">
        <option value="0.8">작게</option>
        <option value="1" selected>보통</option>
        <option value="1.3">크게</option>
      </select>
    </div>
    <div class="modal-row">
      <div class="modal-label">그리기 색상</div>
      <div class="color-swatches" id="drawColorSwatches"></div>
    </div>
    <div class="modal-btns">
      <button class="modal-btn cancel" id="boardClose">닫기</button>
      <button class="modal-btn ok" id="boardOk">적용</button>
    </div>
  </div>
</div>

<!-- 저장 이름 -->
<div class="modal-overlay hidden" id="modalSaveName">
  <div class="modal-box">
    <div class="modal-title">💾 전술판 저장</div>
    <div class="modal-row">
      <div class="modal-label">저장 이름</div>
      <input class="modal-input" id="saveNameInput" placeholder="예: 서브 후 전술" maxlength="20">
    </div>
    <div class="modal-btns">
      <button class="modal-btn cancel" id="saveNameCancel">취소</button>
      <button class="modal-btn ok" id="saveNameOk">저장</button>
    </div>
  </div>
</div>

<!-- 불러오기 -->
<div class="modal-overlay hidden" id="modalLoad">
  <div class="modal-box" style="min-width:320px;">
    <div class="modal-title">📂 저장된 전술판</div>
    <div id="slotList" style="max-height:260px;overflow-y:auto;"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" id="loadClose">닫기</button>
    </div>
  </div>
</div>

<!-- 공유 -->
<div class="modal-overlay hidden" id="modalShare">
  <div class="modal-box">
    <div class="modal-title">🔗 보드 공유</div>
    <div class="modal-label" style="margin-bottom:6px;line-height:1.6;">
      현재 전술판이 URL에 담겼어요.<br>복사해서 카카오톡 등으로 보내세요!
    </div>
    <div class="share-link-box" id="shareLinkBox">—</div>
    <div class="modal-btns">
      <button class="modal-btn cancel" id="shareClose">닫기</button>
      <button class="modal-btn ok" id="shareCopy">📋 링크 복사</button>
    </div>
  </div>
</div>

<script>
// ── 논리 좌표 ──
const LW=520, LH=820;
const MARGIN_X=80, MARGIN_T=60, MARGIN_B=60;
const CL=MARGIN_X, CR=LW-MARGIN_X, CT=MARGIN_T, CB=LH-MARGIN_B;
const CW=CR-CL, CH=CB-CT;
const NET_Y=(CT+CB)/2;
const ALLY_W=CW*0.107, ALLY_L=CL+ALLY_W, ALLY_R=CR-ALLY_W;
const SVC_GAP=CH*0.228, SVC_T=CT+SVC_GAP, SVC_B=CB-SVC_GAP;
const CX_L=(CL+CR)/2;

// ── 색상 팔레트 ──
const COLOR_PALETTE=[
  "#38d9f5","#4ade80","#f87171","#fb923c",
  "#c084fc","#f472b6","#facc15","#60a5fa",
  "#34d399","#ff6b6b","#a78bfa","#fbbf24"
];
const DRAW_COLORS=["#ff6bcb","#FFD93D","#4ade80","#f87171","#38d9f5","#ffffff","#000000"];

// ── 선수 정보 ──
let PINFO={
  M1:{main:"#38d9f5",dark:"#0ea5c9",shadow:"rgba(56,217,245,0.6)", label:"우1",team:"mine",name:"",number:"",position:"",size:1},
  M2:{main:"#4ade80",dark:"#16a34a",shadow:"rgba(74,222,128,0.6)", label:"우2",team:"mine",name:"",number:"",position:"",size:1},
  O1:{main:"#f87171",dark:"#dc2626",shadow:"rgba(248,113,113,0.6)",label:"상1",team:"opp", name:"",number:"",position:"",size:1},
  O2:{main:"#fb923c",dark:"#ea580c",shadow:"rgba(251,146,60,0.6)", label:"상2",team:"opp", name:"",number:"",position:"",size:1},
};
const KEYS=["M1","M2","O1","O2"];

function shadeHex(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.max(0,Math.min(255,r+amt)); g=Math.max(0,Math.min(255,g+amt)); b=Math.max(0,Math.min(255,b+amt));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}
function hexToRgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function updateDark(key){
  PINFO[key].dark=shadeHex(PINFO[key].main,-40);
  PINFO[key].shadow=hexToRgba(PINFO[key].main,0.6);
}

// ── 테마 ──
const THEMES={
  green:{bg:"#1a3d25",courtGrad:["#1c7840","#186535","#155d2e","#125228"],ally:"rgba(0,0,0,0.07)",net:"rgba(0,0,0,0.18)",l1:"rgba(56,217,245,0.3)",l2:"rgba(248,113,113,0.3)"},
  clay: {bg:"#3d2010",courtGrad:["#c4622d","#b5561f","#a84e18","#9a4712"],ally:"rgba(0,0,0,0.09)",net:"rgba(0,0,0,0.2)",l1:"rgba(255,220,150,0.4)",l2:"rgba(255,180,100,0.4)"},
  hard: {bg:"#0d1f3d",courtGrad:["#1a3a7c","#163272","#122b68","#0e245e"],ally:"rgba(255,255,255,0.05)",net:"rgba(0,0,0,0.2)",l1:"rgba(100,200,255,0.35)",l2:"rgba(255,150,100,0.35)"},
  dark: {bg:"#0a0a0a",courtGrad:["#1a1a2e","#16213e","#0f3460","#1a1a2e"],ally:"rgba(255,255,255,0.04)",net:"rgba(0,0,0,0.3)",l1:"rgba(130,130,255,0.35)",l2:"rgba(255,100,130,0.35)"},
  grass:{bg:"#0d2e10",courtGrad:["#2d6a30","#255e28","#1e5222","#174618"],ally:"rgba(0,0,0,0.06)",net:"rgba(0,0,0,0.18)",l1:"rgba(180,255,140,0.35)",l2:"rgba(255,200,100,0.35)"},
};
let currentTheme="green";
let globalSize=1;
let drawColor="#ff6bcb";

// ── 프리셋 ──
const PRESETS={
  basic:   {desc:"💡 전위/후위 기본 대형",    M1:{x:CX_L-50,y:CB-60,role:"후위"},M2:{x:CX_L+50,y:SVC_B+30,role:"전위"},O1:{x:CX_L+50,y:CT+60,role:"후위"},O2:{x:CX_L-50,y:SVC_T-30,role:"전위"}},
  bothUp:  {desc:"💡 둘 다 네트 앞으로",      M1:{x:CX_L-55,y:SVC_B+40,role:"전위"},M2:{x:CX_L+55,y:SVC_B+40,role:"전위"},O1:{x:CX_L+55,y:SVC_T-40,role:"전위"},O2:{x:CX_L-55,y:SVC_T-40,role:"전위"}},
  bothBack:{desc:"💡 둘 다 베이스라인 수비",  M1:{x:CX_L-60,y:CB-40,role:"후위"},M2:{x:CX_L+60,y:CB-40,role:"후위"},O1:{x:CX_L+60,y:CT+40,role:"후위"},O2:{x:CX_L-60,y:CT+40,role:"후위"}},
  iForm:   {desc:"💡 서버+전위 센터에 겹치기",M1:{x:CX_L,y:CB-50,role:"서버"},M2:{x:CX_L,y:SVC_B+30,role:"전위"},O1:{x:CX_L+60,y:CT+50,role:"후위"},O2:{x:CX_L-50,y:SVC_T-30,role:"전위"}},
  aus:     {desc:"💡 서버+전위 같은 사이드",  M1:{x:CX_L-60,y:CB-50,role:"서버"},M2:{x:CX_L-60,y:SVC_B+30,role:"전위"},O1:{x:CX_L+60,y:CT+50,role:"후위"},O2:{x:CX_L+60,y:SVC_T-30,role:"전위"}},
};

// ── 상태 ──
let players={}, ball={x:CX_L,y:NET_Y+60};
let arrows=[], arrowDraw=null, mousePos={x:0,y:0};
let mode="drag";
let showCover=true, showBall=true, showAngle=true;
let dragging=null, dragMoved=false;
let activePreset="basic";
let selectedKeys=new Set();
let drawPaths=[], currentPath=null, isDrawing=false;
let lastTap={key:null,time:0};
let tapStartPos=null;

// ── UI 토글 ──
let uiVisible=false;
const topUI=document.getElementById("topUI");
const bottomUI=document.getElementById("bottomUI");
function setUIVisible(v){
  uiVisible=v;
  topUI.classList.toggle("hidden",!v);
  bottomUI.classList.toggle("hidden",!v);
}
setUIVisible(false);
document.getElementById("toggleHint").addEventListener("click",e=>{e.stopPropagation();setUIVisible(!uiVisible);});

// ── 캔버스 ──
const canvas=document.getElementById("court");
const ctx=canvas.getContext("2d");

function layoutCanvas(){
  const aH=window.innerHeight, aW=window.innerWidth;
  const ratio=LW/LH; let cw,ch;
  if(aW/aH<ratio){cw=aW;ch=aW/ratio;}else{ch=aH;cw=aH*ratio;}
  cw=Math.floor(cw); ch=Math.floor(ch);
  const dpr=window.devicePixelRatio||1;
  canvas.width=cw*dpr; canvas.height=ch*dpr;
  canvas.style.width=cw+"px"; canvas.style.height=ch+"px";
  draw();
}
function px(v){return v*canvas.width/LW;}
function py(v){return v*canvas.height/LH;}
function line(x1,y1,x2,y2){ctx.beginPath();ctx.moveTo(px(x1),py(y1));ctx.lineTo(px(x2),py(y2));ctx.stroke();}

// ── 선수 그리기 ──
function isNearNet(key,pos){
  const m=key.startsWith("M");
  return m?pos.y<NET_Y-30:pos.y>NET_Y+30;
}
function getLabel(key){return PINFO[key].number||PINFO[key].label;}

function drawPerson(key,pos){
  const c=PINFO[key];
  const S=py(28)*(c.size||1)*globalSize;
  const isSel=selectedKeys.has(key);
  const cx=px(pos.x), cy=py(pos.y);
  const volley=isNearNet(key,pos);
  ctx.save();

  if(isSel){
    ctx.shadowBlur=28; ctx.shadowColor=c.shadow;
    ctx.strokeStyle=c.main; ctx.lineWidth=px(3.5);
    ctx.beginPath(); ctx.ellipse(cx,cy-S*0.6,S*0.78,S*1.18,0,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0;
  }
  ctx.fillStyle="rgba(0,0,0,0.25)";
  ctx.beginPath(); ctx.ellipse(cx+px(2),cy+py(2),S*0.5,S*0.18,0,0,Math.PI*2); ctx.fill();

  if(volley){
    ctx.strokeStyle=c.dark; ctx.lineWidth=px(6.5)*(c.size||1)*globalSize; ctx.lineCap="round";
    ctx.shadowBlur=6; ctx.shadowColor=c.shadow;
    ctx.beginPath(); ctx.moveTo(cx-S*0.05,cy-S*0.18); ctx.lineTo(cx-S*0.32,cy+S*0.12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-S*0.05,cy-S*0.18); ctx.lineTo(cx+S*0.28,cy+S*0.08); ctx.stroke();
    ctx.fillStyle=c.main; ctx.strokeStyle=c.dark; ctx.lineWidth=px(1.5);
    ctx.shadowBlur=10; ctx.shadowColor=c.shadow;
    ctx.beginPath();
    ctx.moveTo(cx-S*0.40,cy-S*0.62); ctx.lineTo(cx+S*0.30,cy-S*0.68);
    ctx.lineTo(cx+S*0.20,cy-S*0.20); ctx.lineTo(cx-S*0.20,cy-S*0.18);
    ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;
    ctx.fillStyle="rgba(255,255,255,0.18)";
    ctx.beginPath();
    ctx.moveTo(cx-S*0.32,cy-S*0.59); ctx.lineTo(cx+S*0.12,cy-S*0.64);
    ctx.lineTo(cx+S*0.08,cy-S*0.38); ctx.lineTo(cx-S*0.20,cy-S*0.36);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle=c.dark; ctx.lineWidth=px(5)*(c.size||1)*globalSize; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(cx-S*0.40,cy-S*0.62); ctx.lineTo(cx-S*0.72,cy-S*0.50); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+S*0.30,cy-S*0.68); ctx.lineTo(cx+S*0.46,cy-S*0.45); ctx.stroke();
    ctx.save(); ctx.translate(cx-S*0.82,cy-S*0.46); ctx.rotate(-0.2);
    ctx.strokeStyle=c.main; ctx.lineWidth=px(2.5);
    ctx.beginPath(); ctx.ellipse(0,0,S*0.18,S*0.12,0,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle="rgba(255,255,255,0.5)"; ctx.lineWidth=px(1);
    ctx.beginPath(); ctx.moveTo(-S*0.18,0); ctx.lineTo(S*0.18,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-S*0.12); ctx.lineTo(0,S*0.12); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(S*0.16,S*0.06); ctx.lineTo(S*0.32,S*0.16);
    ctx.strokeStyle=c.dark; ctx.lineWidth=px(3.5)*(c.size||1)*globalSize; ctx.stroke();
    ctx.restore();
    ctx.shadowBlur=8; ctx.shadowColor=c.shadow;
    ctx.fillStyle=c.main; ctx.strokeStyle=c.dark; ctx.lineWidth=px(2);
    ctx.beginPath(); ctx.arc(cx-S*0.05,cy-S*0.95,S*0.28,0,Math.PI*2);
    ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;
    ctx.strokeStyle="rgba(255,255,255,0.55)"; ctx.lineWidth=px(2.5);
    ctx.beginPath(); ctx.arc(cx-S*0.05,cy-S*0.95,S*0.28,Math.PI*0.85,Math.PI*2.15); ctx.stroke();
    ctx.fillStyle="rgba(255,255,255,0.3)";
    ctx.beginPath(); ctx.arc(cx-S*0.13,cy-S*1.06,S*0.1,0,Math.PI*2); ctx.fill();
    drawPlayerLabel(key,cx-S*0.05,cy-S*0.95,S);
  } else {
    ctx.strokeStyle=c.dark; ctx.lineWidth=px(6.5)*(c.size||1)*globalSize; ctx.lineCap="round";
    ctx.shadowBlur=6; ctx.shadowColor=c.shadow;
    ctx.beginPath(); ctx.moveTo(cx,cy-S*0.22); ctx.lineTo(cx-S*0.28,cy+S*0.10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx,cy-S*0.22); ctx.lineTo(cx+S*0.28,cy+S*0.10); ctx.stroke();
    ctx.fillStyle=c.main; ctx.strokeStyle=c.dark; ctx.lineWidth=px(1.5);
    ctx.shadowBlur=10; ctx.shadowColor=c.shadow;
    ctx.beginPath();
    ctx.moveTo(cx-S*0.40,cy-S*0.68); ctx.lineTo(cx+S*0.36,cy-S*0.65);
    ctx.lineTo(cx+S*0.24,cy-S*0.22); ctx.lineTo(cx-S*0.24,cy-S*0.22);
    ctx.closePath(); ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;
    ctx.fillStyle="rgba(255,255,255,0.18)";
    ctx.beginPath();
    ctx.moveTo(cx-S*0.32,cy-S*0.65); ctx.lineTo(cx+S*0.12,cy-S*0.64);
    ctx.lineTo(cx+S*0.08,cy-S*0.40); ctx.lineTo(cx-S*0.22,cy-S*0.40);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle=c.dark; ctx.lineWidth=px(5)*(c.size||1)*globalSize; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(cx+S*0.36,cy-S*0.65); ctx.lineTo(cx+S*0.68,cy-S*0.38); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-S*0.40,cy-S*0.68); ctx.lineTo(cx-S*0.58,cy-S*0.46); ctx.stroke();
    ctx.save(); ctx.translate(cx+S*0.78,cy-S*0.30); ctx.rotate(0.6);
    ctx.strokeStyle=c.main; ctx.lineWidth=px(2.5);
    ctx.beginPath(); ctx.ellipse(0,0,S*0.20,S*0.13,0,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle="rgba(255,255,255,0.5)"; ctx.lineWidth=px(1);
    ctx.beginPath(); ctx.moveTo(-S*0.20,0); ctx.lineTo(S*0.20,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,-S*0.13); ctx.lineTo(0,S*0.13); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-S*0.18,S*0.08); ctx.lineTo(-S*0.34,S*0.20);
    ctx.strokeStyle=c.dark; ctx.lineWidth=px(3.5)*(c.size||1)*globalSize; ctx.stroke();
    ctx.restore();
    ctx.shadowBlur=8; ctx.shadowColor=c.shadow;
    ctx.fillStyle=c.main; ctx.strokeStyle=c.dark; ctx.lineWidth=px(2);
    ctx.beginPath(); ctx.arc(cx,cy-S*0.92,S*0.28,0,Math.PI*2);
    ctx.fill(); ctx.stroke(); ctx.shadowBlur=0;
    ctx.strokeStyle="rgba(255,255,255,0.55)"; ctx.lineWidth=px(2.5);
    ctx.beginPath(); ctx.arc(cx,cy-S*0.92,S*0.28,Math.PI*0.85,Math.PI*2.15); ctx.stroke();
    ctx.fillStyle="rgba(255,255,255,0.3)";
    ctx.beginPath(); ctx.arc(cx-S*0.08,cy-S*1.03,S*0.10,0,Math.PI*2); ctx.fill();
    drawPlayerLabel(key,cx,cy-S*0.92,S);
  }
  ctx.restore();
}

function drawPlayerLabel(key,hx,hy,S){
  const c=PINFO[key];
  // 번호 레이블
  const lw=py(20),lh=py(12);
  ctx.fillStyle="rgba(0,0,0,0.5)";
  ctx.beginPath(); ctx.roundRect(hx-lw/2,hy-lh/2,lw,lh,3); ctx.fill();
  ctx.fillStyle=c.main; ctx.font=`900 ${py(11)}px 'Apple SD Gothic Neo',sans-serif`;
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(getLabel(key),hx,hy);
  // 이름+포지션
  const name=c.name||"", pos=c.position||"";
  if(name||pos){
    const iy=hy+S*0.42;
    const iw=py(name?46:32), ih=py(name&&pos?22:13);
    ctx.fillStyle="rgba(0,0,0,0.55)";
    ctx.beginPath(); ctx.roundRect(hx-iw/2,iy-ih/2,iw,ih,4); ctx.fill();
    ctx.fillStyle=c.main;
    if(name&&pos){
      ctx.font=`700 ${py(9)}px 'Apple SD Gothic Neo',sans-serif`;
      ctx.fillText(name,hx,iy-py(5));
      ctx.fillStyle="rgba(255,255,255,0.6)";
      ctx.font=`${py(8)}px 'Apple SD Gothic Neo',sans-serif`;
      ctx.fillText(pos,hx,iy+py(5));
    } else if(name){
      ctx.font=`700 ${py(9)}px 'Apple SD Gothic Neo',sans-serif`;
      ctx.fillText(name,hx,iy);
    } else {
      ctx.fillStyle="rgba(255,255,255,0.7)";
      ctx.font=`${py(8)}px 'Apple SD Gothic Neo',sans-serif`;
      ctx.fillText(pos,hx,iy);
    }
  }
}

// ── 커버존 ──
function getCoverR(key,pos){const m=key.startsWith("M");return(m?pos.y>NET_Y+60:pos.y<NET_Y-60)?90:60;}
function drawCoverZone(key,pos){
  const r=getCoverR(key,pos), c=PINFO[key];
  ctx.save();
  ctx.fillStyle=hexToRgba(c.main,0.13);
  ctx.beginPath(); ctx.arc(px(pos.x),py(pos.y),px(r),0,Math.PI*2); ctx.fill();
  ctx.strokeStyle=hexToRgba(c.main,0.5); ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
  ctx.beginPath(); ctx.arc(px(pos.x),py(pos.y),px(r),0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// ── 타구각 ──
function drawShotAngles(key,pos){
  const c=PINFO[key]; const bx=pos.x, by=pos.y;
  const isMy=key.startsWith("M");
  const tYf=isMy?CT:CB, tYn=isMy?NET_Y+8:NET_Y-8;
  const corners=[{x:CL,y:tYf},{x:CR,y:tYf},{x:CL,y:tYn},{x:CR,y:tYn}];
  const angs=corners.map(c=>Math.atan2(c.y-by,c.x-bx));
  let mn=Math.min(...angs), mx=Math.max(...angs);
  if(mx-mn>Math.PI)[mn,mx]=[mx,mn+Math.PI*2];
  const fanR=LH*0.52;
  ctx.save();
  ctx.globalAlpha=0.13; ctx.fillStyle=c.main;
  ctx.beginPath(); ctx.moveTo(px(bx),py(by));
  ctx.arc(px(bx),py(by),px(fanR),mn,mx,false); ctx.closePath(); ctx.fill();
  ctx.globalAlpha=0.7; ctx.strokeStyle=c.main; ctx.lineWidth=1.8; ctx.setLineDash([7,4]);
  ctx.beginPath(); ctx.moveTo(px(bx),py(by)); ctx.lineTo(px(bx+fanR*Math.cos(mn)),py(by+fanR*Math.sin(mn))); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px(bx),py(by)); ctx.lineTo(px(bx+fanR*Math.cos(mx)),py(by+fanR*Math.sin(mx))); ctx.stroke();
  ctx.globalAlpha=0.45;
  ctx.beginPath(); ctx.arc(px(bx),py(by),px(fanR*0.32),mn,mx,false); ctx.stroke();
  ctx.setLineDash([]);
  const deg=Math.round(Math.abs(mx-mn)*180/Math.PI);
  const mid=(mn+mx)/2, lr=fanR*0.38;
  const lx=bx+lr*Math.cos(mid), ly=by+lr*Math.sin(mid);
  ctx.globalAlpha=1;
  const tw=py(32),th=py(18);
  ctx.fillStyle="rgba(0,0,0,0.55)";
  ctx.beginPath(); ctx.roundRect(px(lx)-tw/2,py(ly)-th/2,tw,th,4); ctx.fill();
  ctx.fillStyle=c.main; ctx.font=`bold ${py(12)}px 'Apple SD Gothic Neo',sans-serif`;
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText(deg+"°",px(lx),py(ly));
  corners.forEach(c=>{
    ctx.globalAlpha=0.75; ctx.fillStyle=PINFO[key].main;
    ctx.beginPath(); ctx.arc(px(c.x),py(c.y),px(5.5),0,Math.PI*2); ctx.fill();
    ctx.strokeStyle="rgba(255,255,255,0.6)"; ctx.lineWidth=1.2; ctx.globalAlpha=0.9; ctx.stroke();
  });
  ctx.restore();
}

// ── 화살표 ──
function drawArrow(x1,y1,x2,y2,color,dashed){
  const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  if(len<12)return;
  const ang=Math.atan2(dy,dx), ex=x2-13*Math.cos(ang), ey=y2-13*Math.sin(ang);
  ctx.save(); ctx.strokeStyle=color; ctx.fillStyle=color;
  ctx.lineWidth=2.5; ctx.globalAlpha=0.9; ctx.lineCap="round";
  if(dashed)ctx.setLineDash([7,4]);
  ctx.beginPath(); ctx.moveTo(px(x1),py(y1)); ctx.lineTo(px(ex),py(ey)); ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(px(x2),py(y2));
  ctx.lineTo(px(ex-7*Math.sin(ang)),py(ey+7*Math.cos(ang)));
  ctx.lineTo(px(ex+7*Math.sin(ang)),py(ey-7*Math.cos(ang)));
  ctx.closePath(); ctx.fill(); ctx.restore();
}

// ── 공 ──
function drawBall(x,y){
  ctx.save();
  ctx.fillStyle="rgba(0,0,0,0.28)";
  ctx.beginPath(); ctx.arc(px(x+2),py(y+3),px(11),0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#c8f400";
  ctx.beginPath(); ctx.arc(px(x),py(y),px(11),0,Math.PI*2); ctx.fill();
  ctx.strokeStyle="#8faa00"; ctx.lineWidth=1.8;
  ctx.beginPath(); ctx.arc(px(x),py(y),px(11),0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle="rgba(255,255,255,0.5)"; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(px(x-6),py(y)); ctx.quadraticCurveTo(px(x),py(y-5),px(x+6),py(y)); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px(x-6),py(y)); ctx.quadraticCurveTo(px(x),py(y+5),px(x+6),py(y)); ctx.stroke();
  ctx.restore();
}

// ── 자유 그리기 ──
function drawFreeLines(){
  [...drawPaths,(currentPath||null)].filter(Boolean).forEach(path=>{
    if(path.points.length<2)return;
    ctx.save();
    ctx.strokeStyle=path.color; ctx.lineWidth=path.width*(canvas.width/LW);
    ctx.lineCap="round"; ctx.lineJoin="round"; ctx.globalAlpha=0.85;
    ctx.beginPath(); ctx.moveTo(px(path.points[0].x),py(path.points[0].y));
    for(let i=1;i<path.points.length;i++) ctx.lineTo(px(path.points[i].x),py(path.points[i].y));
    ctx.stroke(); ctx.restore();
  });
}

// ── 메인 드로우 ──
function draw(){
  const W=canvas.width, H=canvas.height, T=THEMES[currentTheme];
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=T.bg; ctx.beginPath(); ctx.roundRect(0,0,W,H,12); ctx.fill();
  const cg=ctx.createLinearGradient(0,0,0,H);
  cg.addColorStop(0,T.courtGrad[0]); cg.addColorStop(0.49,T.courtGrad[1]);
  cg.addColorStop(0.51,T.courtGrad[2]); cg.addColorStop(1,T.courtGrad[3]);
  ctx.fillStyle=cg; ctx.fillRect(px(CL),py(CT),px(CR-CL),py(CB-CT));
  ctx.fillStyle=T.ally;
  ctx.fillRect(px(CL),py(CT),px(ALLY_W),py(CB-CT));
  ctx.fillRect(px(ALLY_R),py(CT),px(ALLY_W),py(CB-CT));
  if(showCover) KEYS.forEach(k=>drawCoverZone(k,players[k]));
  if(showAngle&&selectedKeys.size>0) selectedKeys.forEach(k=>drawShotAngles(k,players[k]));
  ctx.strokeStyle="rgba(255,255,255,0.85)"; ctx.lineWidth=2.5;
  ctx.strokeRect(px(CL),py(CT),px(CR-CL),py(CB-CT));
  ctx.strokeStyle="rgba(255,255,255,0.7)"; ctx.lineWidth=1.8;
  line(ALLY_L,CT,ALLY_L,CB); line(ALLY_R,CT,ALLY_R,CB);
  ctx.strokeStyle="rgba(255,255,255,0.65)";
  line(ALLY_L,SVC_T,ALLY_R,SVC_T); line(ALLY_L,SVC_B,ALLY_R,SVC_B);
  ctx.strokeStyle="rgba(255,255,255,0.5)"; ctx.lineWidth=1.5;
  line(CX_L,SVC_T,CX_L,SVC_B); line(CX_L,CT,CX_L,CT+14); line(CX_L,CB-14,CX_L,CB);
  ctx.fillStyle=T.net; ctx.fillRect(0,py(NET_Y-5),W,py(10));
  ctx.shadowBlur=10; ctx.shadowColor="rgba(255,255,255,0.7)";
  ctx.strokeStyle="white"; ctx.lineWidth=3; line(0,NET_Y,LW,NET_Y); ctx.shadowBlur=0;
  ctx.fillStyle="#c8a05a";
  ctx.fillRect(px(CL-8),py(NET_Y-14),px(10),py(28));
  ctx.fillRect(px(CR-2),py(NET_Y-14),px(10),py(28));
  ctx.fillStyle="rgba(255,255,255,0.3)";
  ctx.font=`${py(8)}px sans-serif`; ctx.textAlign="center"; ctx.textBaseline="alphabetic";
  ctx.fillText("NET",px(CX_L),py(NET_Y-8));
  ctx.font=`bold ${py(9)}px 'Apple SD Gothic Neo',sans-serif`;
  ctx.fillStyle=T.l1; ctx.textBaseline="alphabetic";
  ctx.fillText("우리팀 코트",px(CX_L),py(CB-10));
  ctx.fillStyle=T.l2; ctx.fillText("상대팀 코트",px(CX_L),py(CT+20));
  drawFreeLines();
  arrows.forEach(a=>drawArrow(a.x1,a.y1,a.x2,a.y2,a.color,!a.fromKey));
  if(arrowDraw) drawArrow(arrowDraw.x1,arrowDraw.y1,mousePos.x,mousePos.y,arrowDraw.color,!arrowDraw.fromKey);
  if(showBall) drawBall(ball.x,ball.y);
  KEYS.forEach(k=>drawPerson(k,players[k]));
}

// ── 이벤트 ──
function getLogicalPos(e){
  const rect=canvas.getBoundingClientRect();
  const t=e.touches?(e.touches[0]||e.changedTouches[0]):e;
  return{x:Math.max(0,Math.min(LW,(t.clientX-rect.left)/rect.width*LW)),y:Math.max(0,Math.min(LH,(t.clientY-rect.top)/rect.height*LH))};
}
function hitPlayer(pos){
  for(let i=KEYS.length-1;i>=0;i--){const k=KEYS[i],p=players[k];const dx=pos.x-p.x,dy=pos.y-p.y;if(Math.abs(dx)<35&&dy>-65&&dy<18)return k;}
  return null;
}
function hitBall(pos){const dx=pos.x-ball.x,dy=pos.y-ball.y;return Math.sqrt(dx*dx+dy*dy)<18;}

canvas.addEventListener("mousedown", onDown);
canvas.addEventListener("touchstart",onDown,{passive:false});
canvas.addEventListener("mousemove", onMove);
canvas.addEventListener("touchmove", onMove,{passive:false});
canvas.addEventListener("mouseup",   onUp);
canvas.addEventListener("touchend",  onUp);

function onDown(e){
  e.preventDefault();
  const pos=getLogicalPos(e);
  dragMoved=false; tapStartPos={x:pos.x,y:pos.y};
  if(mode==="draw"){currentPath={color:drawColor,width:3,points:[pos]};isDrawing=true;return;}
  const pk=hitPlayer(pos);
  if(mode==="arrow"){
    if(pk) arrowDraw={x1:players[pk].x,y1:players[pk].y,color:PINFO[pk].main,fromKey:pk};
    else   arrowDraw={x1:pos.x,y1:pos.y,color:"rgba(255,255,255,0.75)",fromKey:null};
    mousePos=pos; return;
  }
  if(pk) dragging=pk;
  else if(showBall&&hitBall(pos)) dragging="ball";
}
function onMove(e){
  e.preventDefault();
  const pos=getLogicalPos(e); mousePos=pos;
  if(mode==="draw"&&isDrawing&&currentPath){currentPath.points.push(pos);draw();return;}
  if(dragging&&tapStartPos){const dx=pos.x-tapStartPos.x,dy=pos.y-tapStartPos.y;if(Math.sqrt(dx*dx+dy*dy)>15)dragMoved=true;}
  if(dragMoved){
    if(dragging==="ball"){ball.x=pos.x;ball.y=pos.y;}
    else if(dragging){players[dragging].x=pos.x;players[dragging].y=pos.y;}
    draw();
  }
}
function onUp(e){
  if(mode==="draw"&&isDrawing&&currentPath){
    if(currentPath.points.length>1) drawPaths.push({...currentPath});
    currentPath=null; isDrawing=false; draw(); return;
  }
  if(mode==="arrow"&&arrowDraw){
    const pos=getLogicalPos(e);
    const dx=pos.x-arrowDraw.x1,dy=pos.y-arrowDraw.y1;
    if(Math.sqrt(dx*dx+dy*dy)>20) arrows.push({...arrowDraw,x2:pos.x,y2:pos.y});
    arrowDraw=null;
  } else if(!dragMoved&&dragging&&dragging!=="ball"){
    const now=Date.now();
    if(lastTap.key===dragging&&now-lastTap.time<400){
      openPlayerEdit(dragging); lastTap={key:null,time:0};
    } else {
      lastTap={key:dragging,time:now};
      if(selectedKeys.has(dragging)) selectedKeys.delete(dragging);
      else selectedKeys.add(dragging);
    }
  } else if(!dragMoved&&!dragging){
    const pos=getLogicalPos(e);
    if(!hitPlayer(pos)&&!(showBall&&hitBall(pos))) selectedKeys.clear();
  }
  dragging=null; dragMoved=false; tapStartPos=null; draw();
}

// ── 프리셋 ──
function applyPreset(key){
  activePreset=key; selectedKeys.clear();
  const p=PRESETS[key];
  KEYS.forEach(k=>{players[k]={...p[k]};});
  arrows=[]; arrowDraw=null; drawPaths=[];
  document.getElementById("descBox").textContent=p.desc;
  document.querySelectorAll(".preset-btn").forEach(b=>b.classList.toggle("active",b.dataset.preset===key));
  draw();
}
document.querySelectorAll(".preset-btn").forEach(b=>b.addEventListener("click",()=>applyPreset(b.dataset.preset)));

// ── 버튼 ──
const btnArrow=document.getElementById("btnArrow");
btnArrow.addEventListener("click",()=>{
  mode=mode==="arrow"?"drag":"arrow";
  if(mode==="arrow") document.getElementById("btnDraw").classList.remove("draw-on");
  arrowDraw=null;
  btnArrow.textContent=mode==="arrow"?"✏️ 화살표 ON":"➡️ 화살표";
  btnArrow.classList.toggle("arrow-on",mode==="arrow");
  canvas.classList.toggle("draw-cursor",mode==="arrow");
  updateGuide();
});

const btnDraw=document.getElementById("btnDraw");
btnDraw.addEventListener("click",()=>{
  mode=mode==="draw"?"drag":"draw";
  if(mode==="draw"){btnArrow.classList.remove("arrow-on");btnArrow.textContent="➡️ 화살표";}
  btnDraw.textContent=mode==="draw"?"✏️ 그리기 ON":"✏️ 그리기";
  btnDraw.classList.toggle("draw-on",mode==="draw");
  canvas.classList.toggle("draw-cursor",mode==="draw");
  updateGuide();
});

const btnCover=document.getElementById("btnCover");
btnCover.addEventListener("click",()=>{
  showCover=!showCover;
  btnCover.textContent=showCover?"⭕ 커버존 ON":"⭕ 커버존 OFF";
  btnCover.classList.toggle("cover-on",showCover); draw();
});
const btnBall=document.getElementById("btnBall");
btnBall.addEventListener("click",()=>{
  showBall=!showBall;
  btnBall.textContent=showBall?"🎾 공 ON":"🎾 공 OFF";
  btnBall.classList.toggle("ball-on",showBall); draw();
});
const btnAngle=document.getElementById("btnAngle");
btnAngle.addEventListener("click",()=>{
  showAngle=!showAngle;
  btnAngle.textContent=showAngle?"📐 타구각 ON":"📐 타구각 OFF";
  btnAngle.classList.toggle("angle-on",showAngle); draw();
});
document.getElementById("btnDel").addEventListener("click",()=>{
  arrows=[]; arrowDraw=null; drawPaths=[]; draw(); showToast("화살표·그리기 삭제됨");
});
document.getElementById("btnReset").addEventListener("click",()=>{
  selectedKeys.clear(); applyPreset(activePreset);
  ball={x:CX_L,y:NET_Y+60}; arrows=[]; drawPaths=[]; draw(); showToast("초기화 완료");
});

function updateGuide(){
  const g=document.getElementById("guide");
  if(mode==="arrow") g.innerHTML="선수 탭→드래그: 이동 화살표 &nbsp;·&nbsp; 빈 곳 탭→드래그: 자유 화살표";
  else if(mode==="draw") g.innerHTML="손가락으로 자유롭게 그리세요 &nbsp;·&nbsp; 삭제 버튼으로 지우기";
  else g.innerHTML="선수 탭 → 선택(타구각) &nbsp;·&nbsp; 더블탭 → 편집 &nbsp;·&nbsp; 드래그 → 이동";
}

// ── 선수 편집 ──
let editingKey=null;
function openPlayerEdit(key){
  editingKey=key; const p=PINFO[key];
  document.getElementById("editName").value=p.name||"";
  document.getElementById("editNumber").value=p.number||"";
  document.getElementById("editPosition").value=p.position||"";
  document.getElementById("editSize").value=String(p.size||1);
  const sw=document.getElementById("colorSwatches"); sw.innerHTML="";
  COLOR_PALETTE.forEach(col=>{
    const d=document.createElement("div");
    d.className="color-swatch"+(col===p.main?" selected":"");
    d.style.background=col;
    d.onclick=()=>{sw.querySelectorAll(".color-swatch").forEach(x=>x.classList.remove("selected"));d.classList.add("selected");};
    sw.appendChild(d);
  });
  document.getElementById("modalPlayer").classList.remove("hidden");
}
document.getElementById("editCancel").onclick=()=>document.getElementById("modalPlayer").classList.add("hidden");
document.getElementById("editOk").onclick=()=>{
  const key=editingKey, p=PINFO[key];
  p.name=document.getElementById("editName").value.trim();
  p.number=document.getElementById("editNumber").value.trim();
  p.position=document.getElementById("editPosition").value.trim();
  p.size=parseFloat(document.getElementById("editSize").value)||1;
  const sel=document.querySelector("#colorSwatches .color-swatch.selected");
  if(sel){p.main=sel.style.background;updateDark(key);}
  p.label=p.number||key.replace("M","우").replace("O","상");
  document.getElementById("modalPlayer").classList.add("hidden");
  draw(); showToast("선수 정보 저장됨 ✓");
};

// ── 보드 설정 ──
document.getElementById("btnBoardStyle").onclick=()=>{
  document.querySelectorAll(".theme-chip").forEach(b=>b.classList.toggle("selected",b.dataset.theme===currentTheme));
  document.getElementById("boardSize").value=String(globalSize);
  // 그리기 색상 팔레트
  const ds=document.getElementById("drawColorSwatches"); ds.innerHTML="";
  DRAW_COLORS.forEach(col=>{
    const d=document.createElement("div");
    d.className="color-swatch"+(col===drawColor?" selected":"");
    d.style.background=col;
    if(col==="#ffffff")d.style.border="2px solid rgba(255,255,255,0.4)";
    d.onclick=()=>{ds.querySelectorAll(".color-swatch").forEach(x=>x.classList.remove("selected"));d.classList.add("selected");};
    ds.appendChild(d);
  });
  document.getElementById("modalBoard").classList.remove("hidden");
};
document.getElementById("themeRow").addEventListener("click",e=>{
  const btn=e.target.closest(".theme-chip"); if(!btn)return;
  document.querySelectorAll(".theme-chip").forEach(b=>b.classList.remove("selected")); btn.classList.add("selected");
});
document.getElementById("boardClose").onclick=()=>document.getElementById("modalBoard").classList.add("hidden");
document.getElementById("boardOk").onclick=()=>{
  const sel=document.querySelector(".theme-chip.selected"); if(sel) currentTheme=sel.dataset.theme;
  globalSize=parseFloat(document.getElementById("boardSize").value)||1;
  const dc=document.querySelector("#drawColorSwatches .color-swatch.selected"); if(dc) drawColor=dc.style.background;
  document.getElementById("modalBoard").classList.add("hidden"); draw(); showToast("보드 설정 적용됨 ✓");
};

// ── 저장/불러오기 ──
function getState(){
  return{players:JSON.parse(JSON.stringify(players)),ball:{...ball},arrows:JSON.parse(JSON.stringify(arrows)),
    drawPaths:JSON.parse(JSON.stringify(drawPaths)),PINFO:JSON.parse(JSON.stringify(PINFO)),
    currentTheme,globalSize,activePreset,showCover,showBall,showAngle,drawColor};
}
function loadState(s){
  if(!s)return;
  if(s.players) players=s.players;
  if(s.ball) ball=s.ball;
  if(s.arrows) arrows=s.arrows;
  if(s.drawPaths) drawPaths=s.drawPaths;
  if(s.PINFO) PINFO=s.PINFO;
  if(s.currentTheme) currentTheme=s.currentTheme;
  if(s.globalSize) globalSize=s.globalSize;
  if(s.activePreset) activePreset=s.activePreset;
  if(s.showCover!==undefined) showCover=s.showCover;
  if(s.showBall!==undefined) showBall=s.showBall;
  if(s.showAngle!==undefined) showAngle=s.showAngle;
  if(s.drawColor) drawColor=s.drawColor;
  draw();
}

document.getElementById("btnSave").onclick=()=>{
  document.getElementById("saveNameInput").value="";
  document.getElementById("modalSaveName").classList.remove("hidden");
  setTimeout(()=>document.getElementById("saveNameInput").focus(),100);
};
document.getElementById("saveNameCancel").onclick=()=>document.getElementById("modalSaveName").classList.add("hidden");
document.getElementById("saveNameOk").onclick=()=>{
  const name=document.getElementById("saveNameInput").value.trim()||"전술판";
  const saves=JSON.parse(localStorage.getItem("niji_tactics_saves")||"[]");
  saves.unshift({name,date:new Date().toLocaleString("ko-KR"),state:getState()});
  if(saves.length>20) saves.pop();
  localStorage.setItem("niji_tactics_saves",JSON.stringify(saves));
  document.getElementById("modalSaveName").classList.add("hidden");
  showToast(`"${name}" 저장 완료! 💾`);
};

document.getElementById("btnLoad").onclick=()=>{
  const saves=JSON.parse(localStorage.getItem("niji_tactics_saves")||"[]");
  const list=document.getElementById("slotList"); list.innerHTML="";
  if(saves.length===0){list.innerHTML='<div class="save-empty">저장된 전술판이 없어요</div>';}
  else{
    saves.forEach((s,i)=>{
      const row=document.createElement("div"); row.className="save-slot";
      row.innerHTML=`<div class="save-slot-info"><div class="save-slot-name">${s.name}</div><div class="save-slot-date">${s.date}</div></div><button class="save-slot-del" data-i="${i}">삭제</button>`;
      row.addEventListener("click",e=>{
        if(e.target.classList.contains("save-slot-del")){
          saves.splice(parseInt(e.target.dataset.i),1);
          localStorage.setItem("niji_tactics_saves",JSON.stringify(saves));
          document.getElementById("btnLoad").onclick(); return;
        }
        loadState(s.state);
        document.getElementById("modalLoad").classList.add("hidden");
        showToast(`"${s.name}" 불러오기 완료! 📂`);
      });
      list.appendChild(row);
    });
  }
  document.getElementById("modalLoad").classList.remove("hidden");
};
document.getElementById("loadClose").onclick=()=>document.getElementById("modalLoad").classList.add("hidden");

// ── 공유 ──
document.getElementById("btnShare").onclick=()=>{
  const json=JSON.stringify(getState());
  const b64=btoa(unescape(encodeURIComponent(json)));
  const url=location.href.split("?")[0]+"?s="+b64;
  document.getElementById("shareLinkBox").textContent=url;
  document.getElementById("modalShare").classList.remove("hidden");
};
document.getElementById("shareClose").onclick=()=>document.getElementById("modalShare").classList.add("hidden");
document.getElementById("shareCopy").onclick=()=>{
  const link=document.getElementById("shareLinkBox").textContent;
  navigator.clipboard.writeText(link).then(()=>showToast("링크 복사됨! 카카오톡에 붙여넣기 🔗"))
    .catch(()=>{const ta=document.createElement("textarea");ta.value=link;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);showToast("링크 복사됨! 📋");});
  document.getElementById("modalShare").classList.add("hidden");
};

function loadFromURL(){
  const p=new URLSearchParams(location.search), s=p.get("s"); if(!s)return;
  try{loadState(JSON.parse(decodeURIComponent(escape(atob(s)))));showToast("공유된 전술판을 불러왔어요! 🔗");}catch(e){}
}

// ── 토스트 ──
let toastTimer=null;
function showToast(msg){
  const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2200);
}

// ── 초기 실행 ──
applyPreset("basic");
window.addEventListener("resize",layoutCanvas);
layoutCanvas();
loadFromURL();
</script>
