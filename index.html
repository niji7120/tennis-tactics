
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<link rel="manifest" href="manifest.json">
<title>테니스 스코어보드</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg: #050810;
  --gold: #ffd84d;
  --blue: #1a6bff;
  --red: #ff4f4f;
  --green: #00a651;
  --dim: #7a7aaa;
  --white: #ffffff;
  --panel-bg: rgba(5,8,20,0.99);
}

/* 가로 모드 강제 */
#rotate-msg { display:none !important; }

@media (orientation: portrait) {
  body {
    transform: rotate(90deg);
    transform-origin: left top;
    width: 100vh;
    height: 100vw;
    overflow: hidden;
    position: absolute;
    top: 100%;
    left: 0;
  }
}

html, body {
  width:100%; height:100%;
  background:var(--bg);
  color:var(--white);
  font-family:'Bebas Neue', sans-serif;
  overflow:hidden;
}

/* ─── 메인 화면 ─── */
#main {
  width:100vw; height:100vh;
  display:flex; flex-direction:column;
  position:relative; cursor:pointer; user-select:none;
}
#main::before {
  content:''; position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(0,82,204,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,82,204,0.04) 1px, transparent 1px);
  background-size:60px 60px; pointer-events:none;
}

/* 상단 바 */
#top-bar {
  display:flex; align-items:center; justify-content:center;
  height:8vh; border-bottom:1px solid #0d1020;
  flex-shrink:0; z-index:1; position:relative;
}
#match-title {
  font-family:'Oswald',sans-serif; font-size:clamp(13px,2.2vh,20px);
  color:var(--gold); letter-spacing:4px; font-weight:600;
}
/* 현재 세트 게임 스코어 — 상단 우측 */
#set-display {
  position:absolute; right:3vw; top:50%; transform:translateY(-50%);
  font-family:'Oswald',sans-serif; font-size:clamp(16px,3vh,28px);
  color:var(--dim); letter-spacing:2px;
}
#set-display span { color:var(--white); font-weight:700; font-size:clamp(22px,4vh,38px); }

/* ─── 메인 점수 영역 ─── */
#score-area {
  flex:1; display:flex; align-items:center; justify-content:center;
  gap:0; z-index:1; position:relative;
}

.player-block {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  height:100%; position:relative; transition:background 0.3s;
}
.player-block.serving { background:rgba(173,255,47,0.03); }

/* 서브 표시 */
.serve-dot {
  width:clamp(10px,1.5vh,16px); height:clamp(10px,1.5vh,16px);
  border-radius:50%; background:transparent; border:2px solid var(--dim);
  position:absolute; top:14%; transition:all 0.3s;
}
.serve-dot.on {
  background:radial-gradient(circle at 35% 35%, #ccff00, #88cc00);
  border-color:transparent; box-shadow:0 0 12px rgba(180,255,0,0.7);
  animation:servePulse 1.4s ease-in-out infinite;
}
@keyframes servePulse {
  0%,100% { box-shadow:0 0 8px rgba(180,255,0,0.5); }
  50%      { box-shadow:0 0 20px rgba(180,255,0,0.9); }
}

/* 선수 이름 */
.p-name {
  font-size:clamp(18px,4.5vh,50px); letter-spacing:3px;
  color:#fff; text-align:center; margin-bottom:0.5vh;
  font-family:'Oswald',sans-serif; font-weight:700;
  text-shadow:0 2px 12px rgba(0,0,0,0.9), 0 0 20px rgba(255,255,255,0.2);
}

/* 포인트 숫자 — 크고 굵게 */
.p-pts {
  font-size:clamp(90px,22vw,280px); line-height:0.85;
  color:#fff; font-weight:900;
  -webkit-text-stroke:3px #ffd84d;
  text-shadow:0 0 30px rgba(255,255,255,0.9), 0 0 60px rgba(255,216,77,0.5), 0 4px 0 rgba(0,0,0,0.9);
  transition:color 0.15s; letter-spacing:-2px;
}
.p-pts.deuce-ad {
  color:#ccff00; -webkit-text-stroke:3px rgba(180,255,0,0.5);
  text-shadow:0 0 30px rgba(180,255,0,0.9), 0 0 80px rgba(180,255,0,0.5), 0 4px 0 rgba(0,0,0,0.9);
}

/* 가운데 구분선 */
#divider {
  width:3px; height:60vh;
  background:linear-gradient(to bottom, transparent, var(--gold) 20%, var(--gold) 80%, transparent);
  opacity:0.5; flex-shrink:0;
}

/* 게임 스코어 (하단) */
#game-row { display:none !important; }
#game-row-ORIG {
  display:flex; align-items:center; justify-content:center;
  height:7vh; gap:6vw; flex-shrink:0; z-index:1;
}
.g-score {
  font-size:clamp(28px,5.5vh,56px); color:#fff; letter-spacing:2px;
  font-weight:900; text-shadow:0 0 15px rgba(255,255,255,0.5);
}
.g-label {
  font-size:clamp(8px,1.2vh,12px); color:#aaaacc; letter-spacing:3px;
  font-family:'Oswald',sans-serif; font-weight:400; text-align:center;
}

/* 탭 힌트 */
#tap-hint {
  position:absolute; bottom:2vh; left:50%; transform:translateX(-50%);
  font-family:'Oswald',sans-serif; font-size:clamp(9px,1.3vh,13px);
  color:var(--dim); letter-spacing:3px;
  animation:blink 2.5s ease-in-out infinite;
}
@keyframes blink { 0%,100% { opacity:0.4; } 50% { opacity:0.9; } }

/* 상태 메시지 */
#status-msg {
  position:absolute; top:10%; left:50%; transform:translateX(-50%);
  font-size:clamp(11px,1.8vh,18px); color:var(--gold); letter-spacing:4px;
  font-family:'Oswald',sans-serif; font-weight:300; white-space:nowrap;
  opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:5;
}
#status-msg.show { opacity:1; }

/* ─── 컨트롤 패널 ─── */
#ctrl-panel {
  position:fixed; inset:0; z-index:50;
  display:flex; flex-direction:column; align-items:center; justify-content:flex-end;
  pointer-events:none;
}
#ctrl-backdrop {
  position:absolute; inset:0; background:rgba(0,0,0,0.65);
  backdrop-filter:blur(4px); opacity:0; transition:opacity 0.35s; pointer-events:none;
}
#ctrl-box {
  position:relative; width:100%; max-width:900px;
  background:var(--panel-bg); border-top:2px solid var(--blue);
  border-radius:16px 16px 0 0; padding:16px 20px 24px;
  transform:translateY(100%); transition:transform 0.4s cubic-bezier(0.32,0.72,0,1);
  pointer-events:none; display:flex; flex-direction:column; gap:14px;
}
#ctrl-panel.open #ctrl-backdrop { opacity:1; pointer-events:all; }
#ctrl-panel.open #ctrl-box { transform:translateY(0); pointer-events:all; }

#close-handle {
  width:40px; height:4px; background:var(--dim);
  border-radius:2px; margin:0 auto 4px; cursor:pointer;
}

/* 탭 */
.tab-row {
  display:flex; gap:6px; border-bottom:1px solid #1a1a2e; padding-bottom:10px;
}
.tab-btn {
  flex:1; font-family:'Oswald',sans-serif; font-size:clamp(11px,1.7vh,15px);
  letter-spacing:1.5px; padding:8px 4px;
  background:#0d0f1e; border:1px solid #1a1a2e; color:var(--dim);
  border-radius:4px; cursor:pointer; transition:all 0.2s;
}
.tab-btn.active { background:var(--blue); border-color:var(--blue); color:#fff; }

.tab-content { display:none; }
.tab-content.active { display:flex; flex-direction:column; gap:10px; }

/* 점수 탭 — 좌우 */
.score-tab-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.p-ctrl {
  background:#0d0f1e; border:1px solid #1a1a2e; border-radius:6px;
  padding:12px; display:flex; flex-direction:column; gap:8px;
}
.p-ctrl-name {
  font-family:'Oswald',sans-serif; font-size:clamp(11px,1.6vh,15px);
  letter-spacing:2px; color:var(--gold);
}
.p-ctrl-name.b { color:#5599ff; }
.btn-group { display:flex; gap:6px; }

button {
  font-family:'Oswald',sans-serif; letter-spacing:1px;
  border:none; border-radius:4px; cursor:pointer;
  transition:all 0.15s; font-weight:500;
}
button:active { transform:scale(0.94); }

.btn-pt {
  flex:1; padding:clamp(9px,1.5vh,15px) 8px;
  font-size:clamp(12px,1.7vh,16px);
  background:var(--blue); color:#fff;
}
.btn-pt:hover { background:#0066ff; }

.btn-sm {
  flex:1; padding:clamp(7px,1.1vh,11px) 6px;
  font-size:clamp(10px,1.3vh,13px);
}
.btn-ace { background:rgba(0,166,81,0.15); color:var(--green); border:1px solid var(--green); }
.btn-ace:hover { background:rgba(0,166,81,0.3); }
.btn-flt { background:rgba(255,59,59,0.1); color:var(--red); border:1px solid var(--red); }
.btn-flt:hover { background:rgba(255,59,59,0.25); }
.btn-undo { background:rgba(255,255,255,0.07); color:var(--white); border:1px solid #2a2a4a; }
.btn-undo:hover { border-color:var(--white); }
.btn-rst { background:rgba(255,59,59,0.07); color:var(--red); border:1px solid rgba(255,59,59,0.3); }
.btn-rst:hover { background:rgba(255,59,59,0.2); }
.btn-tb { background:rgba(201,168,76,0.12); color:var(--gold); border:1px solid rgba(201,168,76,0.4); }
.btn-tb:hover { background:rgba(201,168,76,0.22); }

/* 폴트 탭 */
.fault-tab { display:flex; flex-direction:column; gap:12px; }
.fault-info {
  display:flex; align-items:center; gap:12px;
  font-family:'Oswald',sans-serif; font-size:14px;
  letter-spacing:1px; color:var(--dim);
}
.fd { display:flex; gap:8px; }
.fd-dot {
  width:18px; height:18px; border-radius:50%; background:#1a1a2e; transition:background 0.2s;
}
.fd-dot.on { background:var(--red); box-shadow:0 0 8px var(--red); }
.fault-btns { display:flex; gap:8px; }

/* 설정 탭 */
.setup-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.setup-item { display:flex; flex-direction:column; gap:4px; }
.setup-item label {
  font-family:'Oswald',sans-serif; font-size:11px; color:var(--dim);
  letter-spacing:2px;
}
.setup-item input {
  background:#0d0f1e; border:1px solid #1a1a2e; color:var(--white);
  font-family:'Oswald',sans-serif; font-size:clamp(13px,2vh,17px);
  padding:9px 10px; border-radius:4px; letter-spacing:1px; outline:none;
}
.setup-item input:focus { border-color:var(--blue); }
.setup-item.full { grid-column:1/-1; }
.btn-apply {
  width:100%; padding:11px; font-size:14px; letter-spacing:2px;
  background:var(--blue); color:#fff; border-radius:4px;
}
.btn-apply:hover { background:#0066ff; }

/* 위너 오버레이 */
#winner-screen {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.93);
  z-index:200; flex-direction:column; align-items:center; justify-content:center; gap:20px;
}
#winner-screen.show { display:flex; }
.w-title { font-size:clamp(11px,2vh,18px); letter-spacing:6px; color:var(--dim); font-family:'Oswald',sans-serif; }
.w-name { font-size:clamp(40px,10vw,100px); color:var(--gold); text-shadow:0 0 40px rgba(201,168,76,0.5); letter-spacing:4px; }
.w-score { font-size:clamp(14px,2.5vh,24px); color:var(--dim); letter-spacing:4px; font-family:'Oswald',sans-serif; font-weight:300; }
.btn-new {
  padding:14px 40px; font-size:15px; background:var(--blue); color:#fff;
  border-radius:4px; margin-top:10px; letter-spacing:2px; cursor:pointer;
}
.btn-new:hover { background:#0066ff; }
</style>
</head>
<body>

<!-- 세로 모드 안내 -->
<div id="rotate-msg" style="display:none;position:fixed;inset:0;background:#0a0d1a;z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:20px;color:#ffd84d;font-family:'Oswald',sans-serif;letter-spacing:3px;text-align:center;">
  <div style="font-size:60px;">📱</div>
  <div style="font-size:clamp(16px,4vw,24px);font-weight:700;">가로로 돌려주세요</div>
  <div style="font-size:clamp(12px,2.5vw,16px);color:#7a7aaa;margin-top:8px;">ROTATE TO LANDSCAPE</div>
</div>

<!-- ══ 메인 화면 ══ -->
<div id="main" onclick="handleMainTap(event)">

  <!-- 상단 -->
  <div id="top-bar">
    <div id="match-title">🎾 동호인 테니스</div>
    <div id="set-display">게임 <span id="top-g1">0</span> - <span id="top-g2">0</span></div>
  </div>

  <!-- 상태 메시지 -->
  <div id="status-msg"></div>

  <!-- 메인 점수 -->
  <div id="score-area">

    <div class="player-block" id="pb1">
      <div class="serve-dot on" id="sdot1"></div>
      <div class="p-name" id="name1-d">선수 1</div>
      <div class="p-pts" id="pts1-d">0</div>
    </div>

    <div id="divider"></div>

    <div class="player-block" id="pb2">
      <div class="serve-dot" id="sdot2"></div>
      <div class="p-name" id="name2-d">선수 2</div>
      <div class="p-pts" id="pts2-d">0</div>
    </div>

  </div>

  <!-- 게임 스코어 (하단) -->
  <div id="game-row">
    <div style="text-align:right">
      <div class="g-label">게임</div>
      <div id="gsc1" class="g-score">0</div>
    </div>
    <div style="font-size:clamp(16px,3vh,30px);color:var(--dim)">—</div>
    <div>
      <div class="g-label">게임</div>
      <div id="gsc2" class="g-score">0</div>
    </div>
  </div>

  <div id="tap-hint">화면을 탭하면 메뉴가 열립니다</div>
</div>

<!-- ══ 컨트롤 패널 ══ -->
<div id="ctrl-panel">
  <div id="ctrl-backdrop" onclick="closePanel()"></div>
  <div id="ctrl-box">
    <div id="close-handle" onclick="closePanel()"></div>

    <!-- 탭 버튼 (3개만: 점수, 폴트, 설정) -->
    <div class="tab-row">
      <button class="tab-btn active" onclick="switchTab('score')">🎾 점수</button>
      <button class="tab-btn" onclick="switchTab('fault')">✖ 폴트</button>
      <button class="tab-btn" onclick="switchTab('setup')">⚙ 설정</button>
    </div>

    <!-- 점수 탭 -->
    <div class="tab-content active" id="tab-score">
      <div class="score-tab-grid">
        <!-- 선수 1 -->
        <div class="p-ctrl" id="pctrl1">
          <div class="p-ctrl-name" id="c-name1">선수 1</div>
          <div class="btn-group">
            <button class="btn-pt" onclick="addPoint(0);closePanel()">⚡ 포인트</button>
          </div>
          <div class="btn-group" id="srv-btns-1" style="display:none">
            <button class="btn-sm btn-ace" onclick="addAce(0);closePanel()">🎯 에이스</button>
            <button class="btn-sm btn-flt" onclick="addFault(0);closePanel()">폴트</button>
          </div>
        </div>
        <!-- 선수 2 -->
        <div class="p-ctrl" id="pctrl2">
          <div class="p-ctrl-name b" id="c-name2">선수 2</div>
          <div class="btn-group">
            <button class="btn-pt" onclick="addPoint(1);closePanel()">⚡ 포인트</button>
          </div>
          <div class="btn-group" id="srv-btns-2" style="display:none">
            <button class="btn-sm btn-ace" onclick="addAce(1);closePanel()">🎯 에이스</button>
            <button class="btn-sm btn-flt" onclick="addFault(1);closePanel()">폴트</button>
          </div>
        </div>
      </div>
      <!-- 공통 버튼 -->
      <div class="btn-group">
        <button class="btn-sm btn-undo" onclick="undoPoint();closePanel()">↩ 되돌리기</button>
        <button class="btn-sm btn-tb" onclick="setTiebreak();closePanel()">🔀 타이브레이크</button>
        <button class="btn-sm btn-rst" onclick="resetMatch();closePanel()">↺ 초기화</button>
      </div>
    </div>

    <!-- 폴트 탭 -->
    <div class="tab-content" id="tab-fault">
      <div class="fault-tab">
        <div class="fault-info">
          <span>현재 폴트</span>
          <div class="fd">
            <div class="fd-dot" id="fd1"></div>
            <div class="fd-dot" id="fd2"></div>
          </div>
          <span style="margin-left:8px">더블폴트: <span id="df-cnt" style="color:var(--red)">0</span>회</span>
        </div>
        <div class="fault-btns">
          <button class="btn-sm btn-flt" style="flex:1;padding:12px;font-size:14px" onclick="addFault(0);closePanel()">선수1 폴트</button>
          <button class="btn-sm btn-flt" style="flex:1;padding:12px;font-size:14px" onclick="addFault(1);closePanel()">선수2 폴트</button>
        </div>
        <button class="btn-sm btn-undo" style="width:100%;padding:10px" onclick="resetFaults()">폴트 초기화</button>
      </div>
    </div>

    <!-- 설정 탭 -->
    <div class="tab-content" id="tab-setup">
      <div class="setup-grid">
        <div class="setup-item">
          <label>선수 1 이름</label>
          <input type="text" id="in-name1" value="선수 1" placeholder="선수 1 이름">
        </div>
        <div class="setup-item">
          <label>선수 2 이름</label>
          <input type="text" id="in-name2" value="선수 2" placeholder="선수 2 이름">
        </div>
        <div class="setup-item full">
          <label>경기 제목</label>
          <input type="text" id="in-title" value="동호인 테니스" placeholder="대회명 또는 경기명">
        </div>
      </div>
      <button class="btn-apply" onclick="applySetup();closePanel()">✔ 적용하기</button>
    </div>

  </div>
</div>

<!-- 위너 화면 -->
<div id="winner-screen">
  <div class="w-title">🏆 경기 승자</div>
  <div class="w-name" id="w-name">-</div>
  <div class="w-score" id="w-score"></div>
  <button class="btn-new" onclick="resetMatch()">↺ 새 경기 시작</button>
</div>

<script>
/* ─── 상수 ─── */
const PTXT = ['0','15','30','40'];

/* ─── 상태 ─── */
let S = freshState();

function freshState() {
  return {
    serving: 0,
    pts: [0, 0],
    games: [0, 0],
    deuce: false,
    tb: false,
    tbPts: [0, 0],
    faults: 0,
    dfs: 0,
    over: false,
    history: [],
  };
}

/* ─── 패널 ─── */
let panelOpen = false;

function handleMainTap(e) {
  if (panelOpen) return;
  openPanel();
}
function openPanel() {
  panelOpen = true;
  document.getElementById('ctrl-panel').classList.add('open');
  document.getElementById('tap-hint').style.display = 'none';
  updateServeBtns();
}

function updateServeBtns() {
  document.getElementById('srv-btns-1').style.display = S.serving === 0 ? 'flex' : 'none';
  document.getElementById('srv-btns-2').style.display = S.serving === 1 ? 'flex' : 'none';
}
function closePanel() {
  panelOpen = false;
  document.getElementById('ctrl-panel').classList.remove('open');
  document.getElementById('tap-hint').style.display = '';
}
function switchTab(name) {
  const tabs = ['score','fault','setup'];
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', tabs[i]===name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

/* ─── 포인트 로직 ─── */
function addPoint(p) {
  if (S.over) return;
  saveHist();
  S.faults = 0;
  updateFaultDots();

  // 타이브레이크
  if (S.tb) {
    S.tbPts[p]++;
    // 2점마다 서브 교대
    if ((S.tbPts[0]+S.tbPts[1]) % 2 === 1) S.serving = 1-S.serving;
    checkTBWin(p);
    render(); return;
  }

  const o = 1-p;

  // 노애드: 40-40 상태면 바로 게임 종료
  if (S.deuce) {
    winGame(p);
    return;
  }

  S.pts[p]++;

  // 40-40 → 노애드 (다음 포인트가 게임 결정)
  if (S.pts[0]===3 && S.pts[1]===3) {
    S.deuce = true; S.pts=[3,3];
    flashStatus('⚡ 노애드 — 결정 포인트!', 1800);
    render(); return;
  }
  if (S.pts[p] >= 4) winGame(p); else render();
}

function winGame(p) {
  S.games[p]++;
  S.pts=[0,0]; S.deuce=false; S.faults=0;
  S.serving = 1-S.serving;
  checkSetWin(p);
}

function checkSetWin(p) {
  const o=1-p, pg=S.games[p], og=S.games[o];
  // 5-5 → 타이브레이크
  if (pg===5 && og===5) {
    S.tb=true; S.tbPts=[0,0];
    flashStatus('🔀 타이브레이크!', 1800);
    render(); return;
  }
  // 6게임 이상, 2게임차 → 세트 승리 (단, 5-5 이전만)
  const won = (pg>=6 && pg-og>=2) || pg===7;
  if (won) {
    endMatch(p);
  } else {
    render();
  }
}

function checkTBWin(p) {
  const o=1-p, pp=S.tbPts[p], op=S.tbPts[o];
  if (pp>=7 && pp-op>=2) {
    S.tb=false;
    S.games[p]++;
    endMatch(p);
  }
}

function addFault(p) {
  saveHist(); S.faults++;
  updateFaultDots();
  if (S.faults>=2) {
    S.dfs++;
    document.getElementById('df-cnt').textContent=S.dfs;
    flashStatus('⚡ 더블 폴트!', 1800);
    S.faults=0; updateFaultDots();
    addPoint(1-S.serving);
  } else {
    flashStatus('폴트 — 2차 서브', 1400);
  }
}

function addAce(p) { flashStatus('🎯 에이스!', 1200); addPoint(p); }

function setTiebreak() {
  if (S.tb || S.over) return;
  S.tb=true; S.tbPts=[0,0];
  S.games=[5,5];
  render(); flashStatus('🔀 타이브레이크!', 1500);
}

function endMatch(p) {
  S.over=true;
  const n1=document.getElementById('in-name1').value||'선수 1';
  const n2=document.getElementById('in-name2').value||'선수 2';
  const names=[n1,n2];
  document.getElementById('w-name').textContent=names[p];
  document.getElementById('w-score').textContent=`${S.games[p]} - ${S.games[1-p]}`;
  document.getElementById('winner-screen').classList.add('show');
}

/* ─── Undo / Reset ─── */
function saveHist() {
  S.history.push(JSON.stringify({
    serving:S.serving, pts:[...S.pts],
    games:[...S.games], deuce:S.deuce,
    tb:S.tb, tbPts:[...S.tbPts],
    faults:S.faults, dfs:S.dfs, over:S.over
  }));
}
function undoPoint() {
  if (!S.history.length) { flashStatus('되돌릴 기록 없음', 1000); return; }
  const prev=JSON.parse(S.history.pop());
  const hist=S.history;
  Object.assign(S, prev);
  S.games=[...prev.games];
  S.history=hist;
  render(); updateFaultDots();
  document.getElementById('df-cnt').textContent=S.dfs;
  flashStatus('↩ 되돌렸습니다', 1000);
}
function resetFaults() { S.faults=0; updateFaultDots(); }
function resetMatch() {
  S=freshState();
  document.getElementById('winner-screen').classList.remove('show');
  document.getElementById('df-cnt').textContent=0;
  updateFaultDots();
  render();
}

/* ─── 설정 적용 ─── */
function applySetup() {
  const n1=document.getElementById('in-name1').value||'선수 1';
  const n2=document.getElementById('in-name2').value||'선수 2';
  const title=document.getElementById('in-title').value||'동호인 테니스';
  document.getElementById('name1-d').textContent=n1;
  document.getElementById('name2-d').textContent=n2;
  document.getElementById('c-name1').textContent=n1;
  document.getElementById('c-name2').textContent=n2;
  document.getElementById('match-title').textContent='🎾 '+title;
}

/* ─── 렌더링 ─── */
function render() {
  // 서브 표시
  document.getElementById('sdot1').className='serve-dot'+(S.serving===0?' on':'');
  document.getElementById('sdot2').className='serve-dot'+(S.serving===1?' on':'');
  document.getElementById('pb1').className='player-block'+(S.serving===0?' serving':'');
  document.getElementById('pb2').className='player-block'+(S.serving===1?' serving':'');

  // 포인트 텍스트
  let t0,t1,cls0='p-pts',cls1='p-pts';
  if (S.tb) {
    t0=S.tbPts[0]; t1=S.tbPts[1];
  } else if (S.deuce) {
    t0='40'; t1='40';
    cls0+=' deuce-ad'; cls1+=' deuce-ad';
  } else {
    t0=PTXT[S.pts[0]]??'0';
    t1=PTXT[S.pts[1]]??'0';
  }

  const p1e=document.getElementById('pts1-d');
  const p2e=document.getElementById('pts2-d');
  p1e.textContent=t0; p1e.className=cls0;
  p2e.textContent=t1; p2e.className=cls1;

  // 게임 스코어
  document.getElementById('gsc1').textContent=S.games[0];
  document.getElementById('gsc2').textContent=S.games[1];
  document.getElementById('top-g1').textContent=S.games[0];
  document.getElementById('top-g2').textContent=S.games[1];
}

function updateFaultDots() {
  document.getElementById('fd1').className='fd-dot'+(S.faults>=1?' on':'');
  document.getElementById('fd2').className='fd-dot'+(S.faults>=2?' on':'');
}

let statusTimer=null;
function flashStatus(msg, dur=1500) {
  const el=document.getElementById('status-msg');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(statusTimer);
  statusTimer=setTimeout(()=>el.classList.remove('show'), dur);
}

// 초기 렌더
render();

// 서비스워커 등록 (크롬 PWA 전체화면)
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/tennis-scoreboard/sw.js");
}

// 주소창 자동 숨기기
setTimeout(function() { window.scrollTo(0, 1); }, 300);
window.addEventListener('orientationchange', function() {
  setTimeout(function() { window.scrollTo(0, 1); }, 500);
});
</script>
